<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たびメモ — 旅行プランナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --p:#FF6B6B; --pl:#FFF0F0; --pd:#E05555;
  --a:#FFB347; --al:#FFF8EE;
  --g:#6BCB77; --gl:#F0FBF1;
  --b:#4D96FF; --bl:#EEF5FF;
  --t:#2D2D2D; --tm:#9B9B9B;
  --br:#F0EEEB; --bm:#E5E2DC;
  --bg:#FAFAF8; --wh:#FFFFFF;
  --sh0:0 1px 4px rgba(0,0,0,.06);
  --sh1:0 4px 20px rgba(0,0,0,.11);
  --r0:10px; --r1:16px; --r2:24px;
  --f:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{background:var(--wh);border-bottom:1.5px solid var(--br);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-icon{width:32px;height:32px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-logo span{font-size:17px;font-weight:700;letter-spacing:-.3px}
.nav-r{display:flex;gap:8px;align-items:center}
.ibtn{width:36px;height:36px;border-radius:var(--r0);border:1.5px solid var(--bm);background:var(--wh);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .12s}
.ibtn:hover{background:var(--bg)}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* ══ HOME ══ */
.hwrap{max-width:860px;margin:0 auto;padding:40px 24px}
.hhero{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.hhero h1{font-size:26px;font-weight:700;margin-bottom:4px}
.hhero p{font-size:13px;color:var(--tm)}
.btn-new{display:flex;align-items:center;gap:8px;background:var(--p);color:#fff;border:none;border-radius:var(--r0);padding:11px 20px;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(255,107,107,.28);transition:background .12s,transform .1s}
.btn-new:hover{background:var(--pd);transform:translateY(-1px)}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.slabel{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tm)}
.btn-imp{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1.5px solid var(--bm);border-radius:8px;background:var(--wh);color:var(--tm);font-size:12px;font-family:var(--f);cursor:pointer;transition:all .12s}
.btn-imp:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.tcard{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--r1);padding:0;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .12s;position:relative;overflow:hidden}
.tcard:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}
.tc-accent{height:5px}
.tc-body{padding:16px}
.tc-emoji{font-size:30px;margin-bottom:10px}
.tc-name{font-size:14px;font-weight:700;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-meta{font-size:12px;color:var(--tm);display:flex;flex-direction:column;gap:3px}
.tc-acts{position:absolute;top:14px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.tcard:hover .tc-acts{opacity:1}
.tcbtn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--bm);background:var(--wh);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.tcbtn:hover{border-color:var(--p);background:var(--pl)}
.empty-trips{grid-column:1/-1;text-align:center;padding:56px 20px;background:var(--wh);border:1.5px dashed var(--bm);border-radius:var(--r1);color:var(--tm)}
.empty-trips .big{font-size:48px;margin-bottom:12px}

/* ══ PLAN ══ */
.plan-layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 56px);max-width:1160px;margin:0 auto}
.sidebar{background:var(--wh);border-right:1.5px solid var(--br);padding:18px 0;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
.sb-sec{padding:0 14px;margin-bottom:6px}
.sb-tit{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--tm);margin-bottom:8px}
.dlist{display:flex;flex-direction:column;gap:2px}
.dchip{padding:9px 10px;border-radius:var(--r0);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s;border:none;background:transparent;width:100%;text-align:left}
.dchip:hover{background:var(--bg)}.dchip.active{background:var(--pl)}
.cnum{width:24px;height:24px;border-radius:6px;background:var(--br);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tm);flex-shrink:0}
.dchip.active .cnum{background:var(--p);color:#fff}
.clabel{font-size:13px;font-weight:500;flex:1}
.cdate{font-size:10px;color:var(--tm)}
.ccnt{font-size:11px;background:var(--br);color:var(--tm);padding:1px 6px;border-radius:20px}
.dchip.active .ccnt{background:var(--p);color:#fff}
.add-day-btn{width:calc(100% - 24px);margin:6px 12px 0;padding:7px;border:1.5px dashed var(--bm);border-radius:var(--r0);background:transparent;color:var(--tm);font-size:12px;font-family:var(--f);cursor:pointer;transition:all .12s}
.add-day-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.sb-sep{height:1px;background:var(--br);margin:12px 0}
.sb-spots{padding:0 10px}
.sb-sp{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .1s}
.sb-sp:hover{background:var(--bg)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--p);flex-shrink:0}
.sb-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-time{font-size:11px;color:var(--tm)}
.sb-seg{padding:1px 8px 1px 18px;font-size:11px;color:var(--tm)}

/* Plan main */
.pmain{padding:24px 28px}
.ptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ptop-l{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.ptop-r{display:flex;gap:6px;flex-shrink:0}
.trip-inp{font-size:19px;font-weight:700;font-family:var(--f);border:none;background:transparent;color:var(--t);outline:none;flex:1;min-width:0}
.trip-inp::placeholder{color:var(--bm)}

/* stats */
.stats{display:flex;gap:10px;margin-bottom:18px}
.stat{flex:1;background:var(--wh);border:1.5px solid var(--br);border-radius:var(--r0);padding:12px 14px}
.slbl{font-size:11px;color:var(--tm);margin-bottom:2px}
.sval{font-size:18px;font-weight:700}
.stat.r .sval{color:var(--p)}.stat.o .sval{color:var(--a)}.stat.g .sval{color:var(--g)}

/* day bar */
.dbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dbar-l{display:flex;align-items:center;gap:10px}
.dbar h2{font-size:16px;font-weight:700}
.date-inp{font-size:12px;color:var(--tm);border:1.5px solid var(--bm);border-radius:8px;padding:4px 10px;font-family:var(--f);background:var(--wh);outline:none}
.date-inp:focus{border-color:var(--p)}
.btn-deld{padding:5px 12px;border:1.5px solid #FFD0D0;border-radius:8px;background:#FFF5F5;color:var(--p);font-size:12px;font-family:var(--f);cursor:pointer;font-weight:500}

/* add form */
.aform{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--r1);padding:18px 20px;margin-bottom:22px}
.aform-head{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.aform-head h4{font-size:14px;font-weight:700}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.ff label{display:block;font-size:10px;font-weight:700;color:var(--tm);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.ff input,.ff select{width:100%;padding:8px 11px;border:1.5px solid var(--bm);border-radius:var(--r0);font-size:13px;font-family:var(--f);background:var(--bg);color:var(--t);outline:none;transition:border-color .14s}
.ff input:focus,.ff select:focus{border-color:var(--p);background:var(--wh)}
.ff input::placeholder{color:var(--bm)}
.aform-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:4px}
.gmsg{font-size:12px;padding:4px 10px;border-radius:8px;display:none}
.gmsg.ok{color:#2d7a3a;background:var(--gl)}.gmsg.err{color:var(--pd);background:var(--pl)}.gmsg.ld{color:#7a5500;background:var(--al)}
.hint{font-size:11px;color:var(--tm)}
.btn-add{padding:8px 18px;background:var(--p);color:#fff;border:none;border-radius:var(--r0);font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer;transition:background .12s}
.btn-add:hover{background:var(--pd)}

/* ══ TIMELINE ══
   Layout: spot-card → travel-segment → spot-card → …
   The travel segment lives BETWEEN two spot cards.
   Arrival of spot[i+1] = departure(spot[i]) + travel[i]
   departure(spot[i]) = arrival(spot[i]) + stay(spot[i])
*/
/* ── drag & drop ── */
.tl-item{position:relative;transition:opacity .15s}
.tl-item.dragging{opacity:.4}
.tl-item.drag-over-top::before{
  content:'';position:absolute;top:-3px;left:0;right:0;height:3px;
  background:var(--p);border-radius:3px;z-index:10;
}
.tl-item.drag-over-bottom::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;
  background:var(--p);border-radius:3px;z-index:10;
}
.drag-handle{
  cursor:grab;padding:4px 6px;color:var(--bm);font-size:16px;
  line-height:1;border-radius:6px;transition:color .12s;
  user-select:none;flex-shrink:0;
}
.drag-handle:hover{color:var(--tm);background:var(--bg)}
.drag-handle:active{cursor:grabbing}

/* ══ CANDIDATE PICKER ══ */
.cand-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center}
.cand-overlay.open{display:flex}
.cand-box{background:var(--wh);border-radius:var(--r2);padding:24px;width:480px;max-width:93vw;box-shadow:var(--sh1);max-height:80vh;display:flex;flex-direction:column}
.cand-box h3{font-size:16px;font-weight:700;margin-bottom:4px}
.cand-sub{font-size:12px;color:var(--tm);margin-bottom:14px}
.cand-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1}
.cand-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1.5px solid var(--bm);border-radius:var(--r0);cursor:pointer;transition:all .12s}
.cand-item:hover{border-color:var(--p);background:var(--pl)}
.cand-item.sel{border-color:var(--p);background:var(--pl)}
.cand-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.cand-info{flex:1;min-width:0}
.cand-name{font-size:13px;font-weight:700;margin-bottom:3px}
.cand-addr{font-size:11px;color:var(--tm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cand-dist{font-size:11px;color:var(--p);font-weight:700;flex-shrink:0;margin-top:2px}
.cand-acts{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.tl{display:flex;flex-direction:column}
.tl-item{display:flex;gap:10px}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.tl-dot{width:13px;height:13px;border-radius:50%;background:var(--wh);border:3px solid var(--p);flex-shrink:0;margin-top:15px}
.tl-line{width:2px;background:var(--bm);flex:1;min-height:12px}
.tl-body{flex:1;padding-bottom:4px;min-width:0}

/* spot card */
.sc{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--r1);padding:14px 15px;margin-bottom:0;transition:border-color .14s,box-shadow .14s}
.sc:hover{border-color:var(--bm)}
.sc-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sc-l{flex:1;min-width:0}
.sc-num{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;background:var(--pl);color:var(--p);font-size:10px;font-weight:700;margin-bottom:4px}
.sc-name{font-size:14px;font-weight:700;margin-bottom:5px}
.sc-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tt{background:var(--pl);color:var(--pd)} /* time */
.ts{background:var(--gl);color:#2a6a33}   /* stay */
.tn{background:var(--al);color:#7a5500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} /* note */
.sc-btns{display:flex;gap:4px;flex-shrink:0}
.scbtn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--bm);background:var(--wh);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.scbtn:hover{border-color:var(--p);background:var(--pl)}
.sc-addr{font-size:11px;color:var(--tm);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* travel segment – lives between two spot-cards */
.seg{
  background:var(--bg);
  border:1.5px solid var(--bm);
  border-radius:var(--r0);
  padding:10px 14px;
  margin:6px 0;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.seg-mode select{padding:5px 8px;border:1.5px solid var(--bm);border-radius:8px;font-size:12px;font-family:var(--f);background:var(--wh);color:var(--t);cursor:pointer;outline:none}
.seg-mode select:focus{border-color:var(--p)}
.seg-dur{display:flex;align-items:center;gap:6px}
.seg-dur label{font-size:11px;color:var(--tm);white-space:nowrap}
.seg-dur input{width:70px;padding:5px 8px;border:1.5px solid var(--bm);border-radius:8px;font-size:13px;font-weight:700;font-family:var(--f);background:var(--wh);color:var(--t);outline:none;text-align:center}
.seg-dur input:focus{border-color:var(--p)}
.seg-auto{padding:5px 12px;border:1.5px solid var(--bm);border-radius:8px;background:var(--wh);font-size:12px;font-family:var(--f);cursor:pointer;color:var(--tm);white-space:nowrap;transition:all .12s}
.seg-auto:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.seg-auto.loading{color:var(--a);border-color:var(--a)}
.seg-arrow{display:flex;align-items:center;gap:5px;margin-left:auto;font-size:12px;color:var(--tm)}
.seg-arrow strong{font-size:13px;color:var(--t)}

/* empty */
.tl-empty{text-align:center;padding:52px 20px;background:var(--wh);border:1.5px dashed var(--bm);border-radius:var(--r1);color:var(--tm)}
.tl-empty .big{font-size:44px;margin-bottom:10px}

/* ══ MODALS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.33);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--wh);border-radius:var(--r2);padding:26px;width:460px;max-width:93vw;box-shadow:var(--sh1)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--tm);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.mf input,.mf select{width:100%;padding:9px 13px;border:1.5px solid var(--bm);border-radius:var(--r0);font-size:13px;font-family:var(--f);background:var(--bg);color:var(--t);outline:none;transition:border-color .14s}
.mf input:focus{border-color:var(--p);background:var(--wh)}
.mf input::placeholder{color:var(--bm)}
.mgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.egeo{font-size:11px;padding:4px 10px;border-radius:8px;margin-top:6px;display:none}
.egeo.ok{color:#2d7a3a;background:var(--gl)}.egeo.err{color:var(--pd);background:var(--pl)}.egeo.ld{color:#7a5500;background:var(--al)}
.emoji-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-top:6px}
.eo{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--br);background:var(--wh);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.eo:hover,.eo.sel{border-color:var(--p);background:var(--pl)}
.macts{display:flex;gap:8px;margin-top:22px;justify-content:flex-end}
.bsec{padding:8px 18px;border:1.5px solid var(--bm);border-radius:var(--r0);background:var(--wh);font-size:13px;font-family:var(--f);cursor:pointer;color:var(--tm);font-weight:500}
.bsec:hover{color:var(--t);border-color:var(--tm)}
.bok{padding:8px 20px;background:var(--p);color:#fff;border:none;border-radius:var(--r0);font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer}
.bok:hover{background:var(--pd)}

@media(max-width:720px){
  .plan-layout{grid-template-columns:1fr}.sidebar{display:none}
  .stats{flex-wrap:wrap}.fg{grid-template-columns:1fr}.fg3{grid-template-columns:1fr 1fr}
  .pmain{padding:14px}.hwrap{padding:24px 14px}.tgrid{grid-template-columns:1fr 1fr}
}
@media print{
  nav,.sidebar,.aform,.ptop-r,.dbar button,.sc-btns,.seg-auto{display:none!important}
  .plan-layout{display:block}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="goHome()">
    <div class="logo-icon">🗺</div>
    <span>たびメモ</span>
  </div>
  <div class="nav-r">
    <button class="ibtn" onclick="importTrip()" title="読込">📂</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadFile(event)">
  </div>
</nav>

<!-- ══ HOME ══ -->
<div class="screen active" id="homeScreen">
  <div class="hwrap">
    <div class="hhero">
      <div><h1>✈️ わたしの旅行</h1><p>旅のプランをかんたんに作成・管理できます</p></div>
      <button class="btn-new" onclick="openNewModal()">＋ 新しい旅行</button>
    </div>
    <div class="srow">
      <div class="slabel">保存された旅行</div>
      <button class="btn-imp" onclick="importTrip()">📂 読み込む</button>
    </div>
    <div class="tgrid" id="tgrid"></div>
  </div>
</div>

<!-- ══ PLAN ══ -->
<div class="screen" id="planScreen">
  <div class="plan-layout">
    <aside class="sidebar">
      <div class="sb-sec"><div class="sb-tit">日程</div><div class="dlist" id="dlist"></div><button class="add-day-btn" onclick="addDay()">＋ 日を追加</button></div>
      <div class="sb-sep"></div>
      <div class="sb-sec"><div class="sb-tit">スポット</div></div>
      <div class="sb-spots" id="sbspots"></div>
    </aside>
    <main class="pmain">
      <div class="ptop">
        <div class="ptop-l"><input class="trip-inp" id="tripInp" placeholder="旅行名を入力…" oninput="saveCur()"></div>
        <div class="ptop-r">
          <button class="ibtn" onclick="exportCur()" title="エクスポート">💾</button>
          <button class="ibtn" onclick="window.print()" title="印刷">🖨</button>
          <button class="ibtn" onclick="delCurTrip()" title="削除" style="color:var(--p)">🗑</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat r"><div class="slbl">スポット</div><div class="sval" id="stS">0</div></div>
        <div class="stat o"><div class="slbl">合計移動</div><div class="sval" id="stT">—</div></div>
        <div class="stat g"><div class="slbl">合計滞在</div><div class="sval" id="stSt">—</div></div>
        <div class="stat"><div class="slbl">終了予定</div><div class="sval" id="stE">—</div></div>
      </div>
      <div class="dbar">
        <div class="dbar-l"><h2 id="dayTitle">1日目</h2><input type="date" class="date-inp" id="dayDate" onchange="updDate()"></div>
        <button class="btn-deld" onclick="delDay()">この日を削除</button>
      </div>
      <div class="aform">

<script>
/* ── constants ── */
// OSRM: driving エンドポイントのみ使用（各手段は速度係数で計算）
const OSRM_DRIVING = 'https://router.project-osrm.org/route/v1/driving';
const EMOJIS=['✈️','🗺️','🏝️','🏔️','🌸','🎌','🗼','🏯','🌅','🌊','🍜','🍣','🎡','🎭','🚂','🚢','🏕️','🌴','🦁','🐧'];
const COLORS=['#FF6B6B','#FFB347','#6BCB77','#4D96FF','#9B8FFF','#FF9EC4','#4DC6C6','#E8A87C'];
const MICON={car:'🚗',walk:'🚶',bike:'🚲',train:'🚃'};

/* ── state ── */
let trips=[],cache={},curId=null,curDay=0,selEmoji=EMOJIS[0],editIdx=-1;
// editOrigAddr stores the addr at time modal opened, to detect changes
let editOrigAddr='';

/* ── persist ── */
function saveAll(){try{localStorage.setItem('tabimemo_v4',JSON.stringify({trips,cache}));}catch{}}
function loadAll(){try{const r=localStorage.getItem('tabimemo_v4');if(!r)return;const d=JSON.parse(r);trips=d.trips||[];cache=d.cache||{};}catch{}}

/* ── utils ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmtMin(m){m=Math.round(m||0);if(!m)return'0分';return m<60?m+'分':Math.floor(m/60)+'時間'+(m%60?m%60+'分':'')}
function addMin(t,m){m=Math.round(m||0);let[h,mi]=(t||'09:00').split(':').map(Number);mi+=m;h+=Math.floor(mi/60);mi%=60;return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')}
function trip(){return trips.find(t=>t.id===curId)}
function day(){return trip()&&trip().days[curDay]}
function spots(){return day()?day().spots:[]}

/* ── recalc arrivals ──
   spot[0].arrival = user-set (null until first spot arrival is set in edit modal)
   spot[i].arrival = spot[i-1].arrival + spot[i-1].stay + seg[i-1].mins
   If any spot has null arrival, downstream spots are also null.
*/
function recalcArrivals(){
  const sp=spots();
  for(let i=1;i<sp.length;i++){
    const p=sp[i-1];
    const base=p.arrival||p.startTime;
    if(!base){ sp[i].arrival=null; continue; }
    const travel=p.seg?p.seg.mins||0:0;
    sp[i].arrival=addMin(base,(p.stay||0)+travel);
  }
}

/* ── auto travel time via OSRM + 電車概算 ── */
/*
  OSRMのデモAPIは driving プロファイルのみ信頼できる。
  → 車の実際の道路距離(m)を取得し、各手段の現実的な速度で時間を算出する。

  速度の根拠（日本の都市部平均）:
    car  : 30 km/h  (渋滞・信号考慮)
    walk : 4.5 km/h (成人徒歩平均)
    bike : 14 km/h  (ママチャリ〜スポーツ中間)

  電車の概算ロジック:
    直線距離 × 迂回係数 ÷ 表定速度 + 乗換・待ち時間
    - 迂回係数: 1.5（路線が直線でないため）
    - 表定速度: 距離帯によって変化
        〜 5km : 25 km/h（市街地の各停・地下鉄）
        〜20km : 40 km/h（快速・近郊線）
        〜50km : 55 km/h（特急・新快速）
        50km〜 : 80 km/h（新幹線・高速特急）
    - 乗換・待ち時間の加算:
        〜 5km :  5分（同路線乗り換えなし想定）
        〜20km : 10分（1回乗り換え）
        〜50km : 15分（1〜2回乗り換え）
        50km〜 : 20分（新幹線含む乗り換え）
    これで「渋谷→新宿」約5分、「東京→大阪」約150分など
    実態に近い概算が得られる。
*/
const SPEED_KMH = { car: 30, walk: 4.5, bike: 14 };

function estimateTrainMins(straightKm) {
  const dist = straightKm * 1.5; // 迂回係数
  let speed, transfer;
  if (straightKm < 5)       { speed = 25; transfer = 5;  }
  else if (straightKm < 20) { speed = 40; transfer = 10; }
  else if (straightKm < 50) { speed = 55; transfer = 15; }
  else                      { speed = 80; transfer = 20; }
  return Math.round((dist / speed) * 60) + transfer;
}

async function fetchTravel(a, b, mode) {
  const k = `${a.lat.toFixed(4)},${a.lon.toFixed(4)}|${b.lat.toFixed(4)},${b.lon.toFixed(4)}|${mode}`;
  if (cache[k] != null) return cache[k];

  // 電車: OSRM不使用。直線距離ベースの概算
  if (mode === 'train') {
    const straight = distKm2(a.lat, a.lon, b.lat, b.lon);
    const mins = estimateTrainMins(straight);
    cache[k] = mins;
    return mins;
  }

  const speed = SPEED_KMH[mode] || 30;

  try {
    // 常にdrivingで道路距離を取得（最も信頼性が高い）
    const r = await fetch(
      `${OSRM_DRIVING}/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`
    );
    const d = await r.json();
    if (d.code !== 'Ok') throw new Error('no route');

    const distKm = d.routes[0].distance / 1000;

    let mins;
    if (mode === 'car') {
      // 車: OSRM の所要時間そのまま使う（信号・渋滞込み）
      mins = Math.round(d.routes[0].duration / 60);
    } else {
      // 徒歩・自転車: 道路距離 ÷ 速度
      mins = Math.round((distKm / speed) * 60);
    }

    cache[k] = mins;
    return mins;
  } catch {
    // フォールバック: 直線距離 × 1.35（都市迂回係数）
    const straight = distKm2(a.lat, a.lon, b.lat, b.lon);
    const mins = Math.round((straight * 1.35 / speed) * 60);
    cache[k] = mins;
    return mins;
  }
}

// Haversine 直線距離 (km)
function distKm2(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function autoCalcSeg(i){
  const sp=spots();if(i>=sp.length-1)return;
  const seg=sp[i].seg||{mode:'car',mins:0};
  seg.loading=true;
  sp[i].seg=seg;
  renderTl();
  const m=await fetchTravel(sp[i],sp[i+1],seg.mode||'car');
  seg.loading=false;
  if(m!=null){seg.mins=m;seg.auto=true;}
  recalcArrivals();renderTl();saveAll();
}

/* ── postal code normalizer ── */
function normalizeQuery(q){
  // detect Japanese postal code: 〒123-4567 or 123-4567 or 1234567
  const m=q.replace(/〒/g,'').replace(/\s/g,'').match(/^(\d{3})-?(\d{4})$/);
  if(m) return m[1]+'-'+m[2]+', Japan';
  return q;
}

/* ── geocode: returns up to 6 candidates, biased to near existing spots ── */
async function geocodeCandidates(q, biasLat, biasLon){
  q=normalizeQuery(q);
  try{
    // viewbox bias: ±0.5° (~55km) around reference point if available
    const vb = biasLat!=null
      ? `&viewbox=${biasLon-.5},${biasLat+.5},${biasLon+.5},${biasLat-.5}&bounded=0`
      : '';
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1${vb}`;
    const r=await fetch(url,{headers:{'Accept-Language':'ja'}});
    const d=await r.json();
    if(!d.length) return [];
    return d.map(item=>({
      lat:+item.lat, lon:+item.lon,
      display: item.display_name,
      name: item.namedetails?.name || item.name || item.display_name.split(',')[0],
      type: item.type,
      class: item.class,
      addr: item.address
    }));
  }catch{return[]}
}

// km distance between two lat/lon points (Haversine)
function distKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// returns a short readable label from Nominatim address object
function shortAddr(c){
  if(!c.addr) return c.display.split(',').slice(0,3).join(', ');
  const a=c.addr;
  const parts=[a.amenity||a.shop||a.tourism||a.building,a.road,a.suburb||a.neighbourhood,a.city||a.town||a.village,a.country].filter(Boolean);
  return parts.slice(0,4).join(', ');
}

// icon by Nominatim class/type
function candIcon(c){
  const t=c.class+'/'+c.type;
  if(/amenity\/restaurant|amenity\/cafe|amenity\/fast_food|amenity\/food/.test(t)) return '🍽️';
  if(/amenity\/bar|amenity\/pub/.test(t)) return '🍺';
  if(/tourism\/hotel|tourism\/hostel|tourism\/guest_house/.test(t)) return '🏨';
  if(/tourism\/museum/.test(t)) return '🏛️';
  if(/tourism\/attraction|tourism\/viewpoint/.test(t)) return '⭐';
  if(/amenity\/shrine|amenity\/place_of_worship/.test(t)) return '⛩️';
  if(/leisure\/park|leisure\/garden/.test(t)) return '🌳';
  if(/shop/.test(c.class)) return '🛍️';
  if(/railway|highway\/bus_stop/.test(t)) return '🚉';
  if(/airport/.test(t)) return '✈️';
  return '📍';
}

/* ── candidate picker state ── */
let candResolve=null, selCandIdx=0, candItems=[], candInputName='';

function showCandPicker(candidates, biasLat, biasLon, query, inputName){
  candItems=candidates; selCandIdx=0; candInputName=inputName||'';
  document.getElementById('candSub').textContent=
    `「${query}」の検索結果 ${candidates.length}件 — 正しい場所を選んでください`;
  document.getElementById('candList').innerHTML=candidates.map((c,i)=>{
    const dist=biasLat!=null?distKm(biasLat,biasLon,c.lat,c.lon):null;
    const distTxt=dist!=null?(dist<1?(dist*1000).toFixed(0)+'m先':(dist).toFixed(1)+'km先'):'';
    return`<div class="cand-item ${i===0?'sel':''}" id="cand-${i}" onclick="pickCand(${i})">
      <div class="cand-icon">${candIcon(c)}</div>
      <div class="cand-info">
        <div class="cand-name">${c.name||c.display.split(',')[0]}</div>
        <div class="cand-addr">${shortAddr(c)}</div>
      </div>
      ${distTxt?`<div class="cand-dist">${distTxt}</div>`:''}
    </div>`;
  }).join('');

  // 入力名がある場合のみバナーを表示
  const banner = document.getElementById('candNameBanner');
  if(candInputName){
    document.getElementById('candInputName').textContent = candInputName;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('candOverlay').classList.add('open');
  return new Promise(res=>{ candResolve=res; });
}

function pickCand(i){
  selCandIdx=i;
  document.querySelectorAll('.cand-item').forEach((el,j)=>el.classList.toggle('sel',j===i));
}

function closeCandPicker(result){
  document.getElementById('candOverlay').classList.remove('open');
  if(candResolve){
    if(result===true){
      // 候補の場所で決定。名前は入力名を使うかどうかは呼び出し側が判断
      const chosen = {...candItems[selCandIdx]};
      candResolve(chosen);
    } else if(result==='useInputName'){
      // 座標は選択中の候補、名前は入力名で上書き
      const chosen = {...candItems[selCandIdx], overrideName: candInputName};
      candResolve(chosen);
    } else {
      candResolve(null);
    }
  }
  candResolve=null;
}

/* ── unified geocode with picker ── */
// inputName: スポット名フォームに入力された名前（候補名と違う場合に使う）
async function geocodeWithPicker(query, biasLat, biasLon, statusEl, inputName){
  if(statusEl){statusEl.className='gmsg ld';statusEl.style.display='block';statusEl.textContent='📍 場所を検索中…';}
  const candidates = await geocodeCandidates(query, biasLat, biasLon);
  if(!candidates.length){
    if(statusEl){statusEl.className='gmsg err';statusEl.textContent='⚠ 場所が見つかりません。住所をより詳しく入力してください。';}
    return null;
  }
  if(candidates.length===1){
    const c = candidates[0];
    const candName = c.name || c.display.split(',')[0];
    // 入力名と候補名が明らかに違う場合はピッカーを出して確認させる
    const namesDiffer = inputName && inputName !== candName &&
      !candName.toLowerCase().includes(inputName.toLowerCase()) &&
      !inputName.toLowerCase().includes(candName.toLowerCase());
    if(!namesDiffer){
      if(statusEl){statusEl.className='gmsg ok';statusEl.textContent='✓ '+shortAddr(c);}
      return c;
    }
    // 名前が違う → ピッカーで確認
    if(statusEl) statusEl.style.display='none';
    const chosen = await showCandPicker(candidates, biasLat, biasLon, query, inputName);
    if(!chosen){
      if(statusEl){statusEl.className='gmsg err';statusEl.style.display='block';statusEl.textContent='⚠ 場所の選択がキャンセルされました。';}
      return null;
    }
    if(statusEl){statusEl.className='gmsg ok';statusEl.style.display='block';statusEl.textContent='✓ '+shortAddr(chosen);}
    return chosen;
  }
  // Multiple: show picker
  if(statusEl) statusEl.style.display='none';
  const chosen = await showCandPicker(candidates, biasLat, biasLon, query, inputName);
  if(!chosen){
    if(statusEl){statusEl.className='gmsg err';statusEl.style.display='block';statusEl.textContent='⚠ 場所の選択がキャンセルされました。';}
    return null;
  }
  if(statusEl){statusEl.className='gmsg ok';statusEl.style.display='block';statusEl.textContent='✓ '+shortAddr(chosen);}
  return chosen;
}

// get bias point: last registered spot (or any existing spot centroid)
function getBiasPoint(){
  const sp=spots();
  if(sp.length) return{lat:sp[sp.length-1].lat, lon:sp[sp.length-1].lon};
  // fallback: centroid of all spots across all days
  const all=trip()?.days.flatMap(d=>d.spots)||[];
  if(all.length){
    return{lat:all.reduce((a,s)=>a+s.lat,0)/all.length, lon:all.reduce((a,s)=>a+s.lon,0)/all.length};
  }
  return{lat:null,lon:null};
}

/* ── screens ── */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){curId=null;showScreen('homeScreen');renderHome()}

/* ── home ── */
function renderHome(){
  const g=document.getElementById('tgrid');
  if(!trips.length){g.innerHTML='<div class="empty-trips"><div class="big">✈️</div><p>まだ旅行プランがありません</p><p style="margin-top:6px;font-size:12px">「新しい旅行」から始めましょう！</p></div>';return}
  g.innerHTML=trips.map(t=>{
    const tot=t.days.reduce((a,d)=>a+d.spots.length,0);
    const dates=t.days.map(d=>d.date).filter(Boolean).sort();
    const range=!dates.length?`${t.days.length}日間`:dates.length===1?dates[0].replace(/-/g,'/'):dates[0].replace(/-/g,'/')+'〜'+dates[dates.length-1].replace(/-/g,'/');
    return`<div class="tcard" onclick="openTrip('${t.id}')">
      <div class="tc-accent" style="background:${t.color}"></div>
      <div class="tc-body">
        <div class="tc-emoji">${t.emoji}</div>
        <div class="tc-name">${t.name}</div>
        <div class="tc-meta"><span>📅 ${range}</span><span>📍 ${tot}スポット・${t.days.length}日間</span></div>
      </div>
      <div class="tc-acts">
        <button class="tcbtn" onclick="event.stopPropagation();exportTrip('${t.id}')" title="保存">💾</button>
        <button class="tcbtn" onclick="event.stopPropagation();delTrip('${t.id}')" title="削除">🗑</button>
      </div>
    </div>`;
  }).join('');
}

/* ── new trip modal ── */
function openNewModal(){
  selEmoji=EMOJIS[0];
  document.getElementById('ntName').value='';
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<button class="eo ${e===selEmoji?'sel':''}" onclick="pickEmoji('${e}',this)">${e}</button>`).join('');
  document.getElementById('newModal').classList.add('open');
  setTimeout(()=>document.getElementById('ntName').focus(),80);
}
function pickEmoji(e,btn){selEmoji=e;document.querySelectorAll('.eo').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function closeNew(){document.getElementById('newModal').classList.remove('open')}
function createTrip(){
  const name=document.getElementById('ntName').value.trim()||'新しい旅行';
  const t={id:uid(),name,emoji:selEmoji,color:COLORS[trips.length%COLORS.length],createdAt:Date.now(),days:[{id:uid(),label:'1日目',date:'',spots:[]}]};
  trips.unshift(t);saveAll();closeNew();openTrip(t.id);
}

/* ── open/del trip ── */
function openTrip(id){
  curId=id;curDay=0;showScreen('planScreen');
  document.getElementById('tripInp').value=trip().name;
  document.getElementById('dayDate').value=trip().days[0].date||'';
  renderPlan();
}
function delTrip(id){if(!confirm('この旅行を削除しますか？'))return;trips=trips.filter(t=>t.id!==id);saveAll();renderHome()}
function delCurTrip(){if(!confirm('この旅行を削除しますか？'))return;trips=trips.filter(t=>t.id!==curId);saveAll();goHome()}

/* ── export/import ── */
function exportTrip(id){const t=trips.find(x=>x.id===id);if(!t)return;const b=new Blob([JSON.stringify({trip:t,cache},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=t.name+'.json';a.click()}
function exportCur(){if(curId)exportTrip(curId)}
function importTrip(){document.getElementById('fileInput').click()}
function loadFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.trip){d.trip.id=uid();trips.unshift(d.trip);if(d.cache)Object.assign(cache,d.cache);saveAll();renderHome();}
      else if(d.state&&d.state.days){trips.unshift({id:uid(),name:d.state.tripName||'読み込んだ旅行',emoji:'✈️',color:COLORS[0],createdAt:Date.now(),days:d.state.days});if(d.cache)Object.assign(cache,d.cache);saveAll();renderHome();}
      else alert('対応していないファイル形式です');
    }catch{alert('読み込みに失敗しました')}
  };
  r.readAsText(f);e.target.value='';
}

/* ── days ── */
function switchDay(i){curDay=i;document.getElementById('dayDate').value=day().date||'';renderPlan()}
function addDay(){const n=trip().days.length+1;trip().days.push({id:uid(),label:`${n}日目`,date:'',spots:[]});curDay=trip().days.length-1;document.getElementById('dayDate').value='';saveCur();renderPlan()}
function delDay(){if(trip().days.length===1){alert('最後の日程は削除できません');return}if(!confirm('この日程を削除しますか？'))return;trip().days.splice(curDay,1);curDay=Math.max(0,curDay-1);document.getElementById('dayDate').value=day().date||'';saveCur();renderPlan()}
function updDate(){day().date=document.getElementById('dayDate').value;saveCur()}
function saveCur(){if(trip())trip().name=document.getElementById('tripInp').value||trip().name;saveAll()}

/* ── add spot ── */
async function addSpot(){
  const name=document.getElementById('fName').value.trim();
  const addr=document.getElementById('fAddr').value.trim();
  const stay=parseInt(document.getElementById('fStay').value)||60;
  const mode=document.getElementById('fMode').value;
  const note=document.getElementById('fNote').value.trim();
  if(!name){alert('スポット名を入力してください');return}
  const msg=document.getElementById('gmsg');
  const bias=getBiasPoint();
  const geo=await geocodeWithPicker(addr||name, bias.lat, bias.lon, msg, name);
  if(!geo) return;
  // overrideName: ユーザーが「入力名で登録」を選んだ場合はそちらを優先
  const spotName = geo.overrideName || name;
  const sp=spots();
  const prev=sp[sp.length-1];
  // arrival: calculated from previous spot if exists, otherwise null (set manually later)
  const arrival=prev
    ? addMin(prev.arrival||prev.startTime,(prev.stay||0)+(prev.seg?prev.seg.mins||0:0))
    : null;
  sp.push({name:spotName,lat:geo.lat,lon:geo.lon,addr:shortAddr(geo),startTime:null,arrival,stay,note,
    seg:{mode,mins:0,auto:false}
  });
  document.getElementById('fName').value='';
  document.getElementById('fAddr').value='';
  document.getElementById('fNote').value='';
  renderPlan();
  if(sp.length>1) autoCalcSeg(sp.length-2);
  saveAll();
  setTimeout(()=>{msg.style.display='none'},4000);
}

/* ── remove spot ── */
function removeSpot(i){if(!confirm('このスポットを削除しますか？'))return;spots().splice(i,1);recalcArrivals();renderPlan();saveAll()}

/* ── edit spot modal ── */
function openEdit(i){
  editIdx=i;
  const s=spots()[i];
  document.getElementById('eName').value=s.name;
  document.getElementById('eAddr').value=s.addr||'';
  editOrigAddr=s.addr||'';
  document.getElementById('eTime').value=s.arrival||s.startTime;
  document.getElementById('eStay').value=s.stay;
  document.getElementById('eNote').value=s.note||'';
  const eg=document.getElementById('egeo');eg.style.display='none';
  document.getElementById('editModal').classList.add('open');
}
async function saveEdit(){
  const s=spots()[editIdx];
  const newName=document.getElementById('eName').value.trim()||s.name;
  const newAddr=document.getElementById('eAddr').value.trim();
  const newTime=document.getElementById('eTime').value;
  const newStay=parseInt(document.getElementById('eStay').value)||s.stay;
  const newNote=document.getElementById('eNote').value.trim();
  const eg=document.getElementById('egeo');
  const btn=document.getElementById('editSaveBtn');
  let addrChanged=false;

  if(newAddr && newAddr!==editOrigAddr){
    btn.disabled=true; btn.textContent='検索中…';
    // bias: prefer vicinity of neighbouring spots
    const sp=spots();
    const refSpot = editIdx>0 ? sp[editIdx-1] : sp[editIdx+1];
    const bLat=refSpot?refSpot.lat:s.lat, bLon=refSpot?refSpot.lon:s.lon;
    const geo=await geocodeWithPicker(newAddr, bLat, bLon, eg, newName);
    btn.disabled=false; btn.textContent='保存';
    if(!geo) return;
    s.lat=geo.lat; s.lon=geo.lon; s.addr=shortAddr(geo);
    // overrideName: ユーザーが「入力名で登録」を選んだ場合はそちらを名前に反映
    if(geo.overrideName) s.name=geo.overrideName;
    if(editIdx>0){const prev=sp[editIdx-1];if(prev.seg)prev.seg.auto=false}
    if(sp[editIdx+1]){if(s.seg)s.seg.auto=false}
    addrChanged=true;
  } else if(newAddr){ s.addr=newAddr; }

  s.name=newName; s.arrival=newTime; s.stay=newStay; s.note=newNote;
  if(editIdx===0) s.startTime=newTime;
  recalcArrivals();
  closeEdit(); renderPlan(); saveAll();
  if(addrChanged){
    if(editIdx>0) autoCalcSeg(editIdx-1);
    if(spots()[editIdx+1]) autoCalcSeg(editIdx);
  }
}
function closeEdit(){document.getElementById('editModal').classList.remove('open')}

/* ── segment: mode change ── */
function segModeChange(i,mode){
  const sp=spots();sp[i].seg=sp[i].seg||{mode,mins:0,auto:false};
  sp[i].seg.mode=mode;sp[i].seg.auto=false;
  renderTl();saveAll();
}

/* ── segment: manual minutes input ── */
function segMinsInput(i,val){
  const sp=spots();sp[i].seg=sp[i].seg||{mode:'car',mins:0,auto:false};
  sp[i].seg.mins=parseInt(val)||0;sp[i].seg.auto=false;
  recalcArrivals();renderTl();saveAll();
}

/* ── segment: auto button ── */
async function segAutoBtn(i){
  await autoCalcSeg(i);
}

/* ── render plan ── */
function renderPlan(){renderDlist();renderSb();renderStats();renderTl();document.getElementById('dayTitle').textContent=day()?day().label:''}

function renderDlist(){
  const t=trip();if(!t)return;
  document.getElementById('dlist').innerHTML=t.days.map((d,i)=>`
    <button class="dchip ${i===curDay?'active':''}" onclick="switchDay(${i})">
      <div class="cnum">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="clabel">${d.label}</div>
        ${d.date?`<div class="cdate">${d.date.replace(/-/g,'/')}</div>`:''}
      </div>
      <span class="ccnt">${d.spots.length}</span>
    </button>`).join('');
}

function renderSb(){
  const sp=spots();const el=document.getElementById('sbspots');
  if(!sp.length){el.innerHTML='<div style="padding:4px 8px;font-size:12px;color:var(--tm)">まだスポットなし</div>';return}
  el.innerHTML=sp.map((s,i)=>`
    <div class="sb-sp" onclick="scrollToCard(${i})">
      <div class="sb-dot"></div>
      <div class="sb-name">${s.name}</div>
      <div class="sb-time">${s.arrival||s.startTime||'未設定'}</div>
    </div>
    ${i<sp.length-1&&s.seg?`<div class="sb-seg">${MICON[s.seg.mode||'car']} ${s.seg.mins?fmtMin(s.seg.mins):'…'}</div>`:''}`).join('');
}

function renderStats(){
  const sp=spots();
  document.getElementById('stS').textContent=sp.length;
  const tt=sp.slice(0,-1).reduce((a,s)=>a+(s.seg?s.seg.mins||0:0),0);
  const ts=sp.reduce((a,s)=>a+(s.stay||0),0);
  document.getElementById('stT').textContent=sp.length>1?fmtMin(tt):'—';
  document.getElementById('stSt').textContent=sp.length?fmtMin(ts):'—';
  if(sp.length){const l=sp[sp.length-1];document.getElementById('stE').textContent=(l.arrival||l.startTime)?addMin(l.arrival||l.startTime,l.stay||0):'未設定'}
  else document.getElementById('stE').textContent='—';
}

function renderTl(){
  const sp=spots();const el=document.getElementById('tl');
  if(!sp.length){el.innerHTML='<div class="tl-empty"><div class="big">🗺️</div><p>スポットがまだありません</p><p style="margin-top:4px;font-size:12px">フォームから追加しましょう！</p></div>';return}

  el.innerHTML=sp.map((s,i)=>{
    const isLast=i===sp.length-1;
    const seg=s.seg||{mode:'car',mins:0,auto:false};
    const nextSpot=sp[i+1];
    const depTime=addMin(s.arrival||s.startTime,s.stay||0);

    return`
    <div class="tl-item" draggable="true" data-idx="${i}"
      ondragstart="onDragStart(event,${i})"
      ondragover="onDragOver(event,${i})"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,${i})"
      ondragend="onDragEnd(event)">
      <div class="tl-left">
        <div class="tl-dot"></div>
        ${!isLast?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-body">
        <!-- spot card -->
        <div class="sc" id="card-${i}">
          <div class="sc-row">
            <div class="sc-l">
              <div class="sc-num">${i+1}</div>
              <div class="sc-name">${s.name}</div>
              <div class="sc-tags">
                ${s.arrival
                  ? `<span class="tag tt">🕐 ${s.arrival} 着</span>`
                  : `<span class="tag" style="background:var(--bg);color:var(--tm);border:1px dashed var(--bm);cursor:pointer" onclick="openEdit(${i})" title="到着時刻を設定">🕐 未設定 ✏️</span>`}
                <span class="tag ts">⏱ 滞在 ${fmtMin(s.stay)}</span>
                ${s.arrival ? `<span class="tag" style="background:var(--bg);color:var(--tm);border:1px solid var(--bm)">🏁 ${depTime} 発</span>` : ''}
                ${s.note?`<span class="tag tn">📝 ${s.note}</span>`:''}
              </div>
              ${s.addr?`<div class="sc-addr">📍 ${s.addr}</div>`:''}
            </div>
            <div class="sc-btns">
              <div class="drag-handle" title="ドラッグで並び替え">⠿</div>
              <button class="scbtn" onclick="openEdit(${i})" title="編集">✏️</button>
              <button class="scbtn" onclick="removeSpot(${i})" title="削除">🗑</button>
            </div>
          </div>
        </div>

        <!-- travel segment (only between spots) -->
        ${!isLast?`
        <div class="seg">
          <div class="seg-mode">
            <select onchange="segModeChange(${i},this.value)">
              <option value="car"  ${(seg.mode||'car')==='car' ?'selected':''}>🚗 車</option>
              <option value="walk" ${seg.mode==='walk'?'selected':''}>🚶 徒歩</option>
              <option value="bike" ${seg.mode==='bike'?'selected':''}>🚲 自転車</option>
              <option value="train" ${seg.mode==='train'?'selected':''}>🚃 電車</option>
            </select>
          </div>
          <div class="seg-dur">
            <label>移動時間</label>
            <input type="number" min="0" max="999" value="${seg.mins||0}"
              oninput="segMinsInput(${i},this.value)"
              style="${seg.loading?'color:var(--a)':''}">
            <span style="font-size:12px;color:var(--tm)">分</span>
          </div>
          ${seg.mode!=='train'?`<button class="seg-auto ${seg.loading?'loading':''}" onclick="segAutoBtn(${i})">${seg.loading?'計算中…':seg.mode==='walk'?'🔄 徒歩で計算':seg.mode==='bike'?'🔄 自転車で計算':'🔄 車で計算'}</button>`
          :`<button class="seg-auto ${seg.loading?'loading':''}" onclick="segAutoBtn(${i})" title="直線距離ベースの概算です">${seg.loading?'計算中…':'🚃 概算で計算'}</button>`}
          <div class="seg-arrow">
            <span>→</span>
            <strong>${nextSpot.arrival?nextSpot.arrival:'未設定'} 着</strong>
            <span style="color:var(--tm)">${nextSpot.name}</span>
            ${seg.mode==='train'&&seg.mins?`<span style="font-size:10px;color:var(--tm);background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--bm)">概算</span>`:''}
          </div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function scrollToCard(i){const e=document.getElementById(`card-${i}`);if(e)e.scrollIntoView({behavior:'smooth',block:'center'})}

/* ── drag & drop ── */
let dragSrcIdx = -1;

function onDragStart(e, i) {
  dragSrcIdx = i;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', i);
  setTimeout(() => {
    const el = e.currentTarget;
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (i === dragSrcIdx) return;
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  el.classList.remove('drag-over-top', 'drag-over-bottom');
  el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onDrop(e, targetIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
  if (dragSrcIdx === -1 || dragSrcIdx === targetIdx) return;

  const sp = spots();
  const rect = e.currentTarget.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  // above mid → insert before targetIdx, below mid → insert after
  let insertAt = e.clientY < mid ? targetIdx : targetIdx + 1;
  if (dragSrcIdx < insertAt) insertAt--; // account for removal shift

  const [moved] = sp.splice(dragSrcIdx, 1);
  // reset segs since adjacency changed
  moved.seg = moved.seg || {mode:'car', mins:0, auto:false};
  sp.splice(insertAt, 0, moved);

  // reset arrival and seg.mins for all spots (need recalc)
  sp.forEach((s, i) => {
    if (i > 0) { s.arrival = null; }
    if (s.seg) { s.seg.mins = 0; s.seg.auto = false; }
  });

  dragSrcIdx = -1;
  renderPlan();
  saveAll();

  // auto-recalc all segments after drop
  (async () => {
    for (let i = 0; i < sp.length - 1; i++) {
      await autoCalcSeg(i);
    }
  })();
}

function onDragEnd(e) {
  dragSrcIdx = -1;
  document.querySelectorAll('.tl-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  });
}

/* ── boot ── */
loadAll();renderHome();
</script>
